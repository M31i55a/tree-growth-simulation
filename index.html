<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reflective Tree - Final Version</title>
    <style>
      body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GUI } from "lil-gui";

      // --- Configuration & UI Parameters ---
      const params = {
        minDist: 6,
        maxDist: 150,
        branchLen: 5,
        leafCount: 2500,
        initialRadius: 4,
        radiusDecay: 0.97,
        maxBranches: 5000,
        ambientIntensity: 0.4,
        dirIntensity: 3,
        trunkColor: '#8b4513',
        leafColor: '#00ff80',
        branchCount: 0,
        resetTree: () => resetTree()
      };

      // --- Branch Class ---
      class Branch {
        constructor(parent, pos, dir, generation = 0) {
          this.parent = parent;
          this.pos = pos.clone();
          this.dir = dir.clone();
          this.saveDir = dir.clone();
          this.count = 0;
          this.len = params.branchLen;
          this.generation = generation;
          this.radius = params.initialRadius * Math.pow(params.radiusDecay, generation);
          this.mesh = null;
        }

        reset() {
          this.count = 0;
          this.dir.copy(this.saveDir);
        }

        next() {
          let nextDir = this.dir.clone().multiplyScalar(this.len);
          let nextPos = this.pos.clone().add(nextDir);
          return nextPos;
        }
      }

      // --- Leaf Class ---
      class Leaf {
        constructor() {
          const r = 150;
          const theta = Math.random() * 2 * Math.PI;
          const phi = Math.acos(2 * Math.random() - 1);
          this.pos = new THREE.Vector3(
            r * Math.sin(phi) * Math.cos(theta),
            r * Math.sin(phi) * Math.sin(theta) + 150,
            r * Math.cos(phi)
          );
          this.reached = false;
        }
      }

      // --- Helper: Create Cylinder ---
      function createCylinderBetweenPoints(startPoint, endPoint, startRadius, endRadius, container, generation) {
        const direction = endPoint.clone().sub(startPoint);
        const length = direction.length();
        const geometry = new THREE.CylinderGeometry(startRadius, endRadius, length, 8);

        let color;
        if (generation === 0) {
          color = new THREE.Color(0x00ff00);
        } else {
          const t = Math.min(generation / 80, 0.8);
          color = new THREE.Color(params.trunkColor).lerp(new THREE.Color(0x00ff00), t);
        }

        const material = new THREE.MeshPhongMaterial({
          color: color,
          shininess: 40,
          emissive: generation === 0 ? 0x00ff00 : 0x000000,
          emissiveIntensity: generation === 0 ? 0.3 : 0,
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(startPoint.clone().add(endPoint).multiplyScalar(0.5));
        direction.normalize();
        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction);
        
        mesh.castShadow = true;
        mesh.receiveShadow = true;

        container.add(mesh);
        return mesh;
      }

      // --- Tree Class ---
      class Tree {
        constructor(container) {
          this.branches = [];
          this.leaves = [];
          this.container = container;
          this.leafGeometry = new THREE.BufferGeometry();
          this.leafMaterial = new THREE.PointsMaterial({
            color: params.leafColor,
            size: 1.5,
            sizeAttenuation: true,
          });
          this.leafPoints = new THREE.Points(this.leafGeometry, this.leafMaterial);
          this.container.add(this.leafPoints);

          for (let i = 0; i < params.leafCount; i++) {
            this.leaves.push(new Leaf());
          }

          let root = new Branch(null, new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 1, 0), 0);
          this.branches.push(root);

          let current = root;
          let found = false;
          while (!found) {
            for (let l of this.leaves) {
              if (current.pos.distanceTo(l.pos) < params.maxDist) found = true;
            }
            if (!found) {
              let trunk = new Branch(current, current.next(), current.dir, 0);
              trunk.mesh = createCylinderBetweenPoints(current.pos, trunk.pos, trunk.radius, trunk.radius * params.radiusDecay, this.container, 0);
              this.branches.push(trunk);
              current = trunk;
            }
          }
        }

        grow() {
          // Process Leaves
          for (let l of this.leaves) {
            let closestBranch = null;
            let record = params.maxDist;
            for (let b of this.branches) {
              let d = l.pos.distanceTo(b.pos);
              if (d < params.minDist) {
                l.reached = true;
                closestBranch = null;
                break;
              } else if (d < record) {
                closestBranch = b;
                record = d;
              }
            }
            if (closestBranch != null) {
              closestBranch.dir.add(l.pos.clone().sub(closestBranch.pos).normalize());
              closestBranch.count++;
            }
          }

          this.leaves = this.leaves.filter((l) => !l.reached);

          // Process New Branches
          for (let i = this.branches.length - 1; i >= 0; i--) {
            let b = this.branches[i];
            
            if (b.count > 0) {
              // Only create if under limit
              if (this.branches.length < params.maxBranches) {
                b.dir.divideScalar(b.count + 1);
                b.dir.add(new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(0.1)).normalize();
                
                let newB = new Branch(b, b.next(), b.dir, b.generation + 1);
                newB.mesh = createCylinderBetweenPoints(b.pos, newB.pos, b.radius, newB.radius, this.container, newB.generation);
                
                this.branches.push(newB);
              }
              b.reset();
            }
          }
          params.branchCount = this.branches.length;
          this.updateVisuals();
        }

        updateVisuals() {
          const pos = [];
          for (let l of this.leaves) pos.push(l.pos.x, l.pos.y, l.pos.z);
          this.leafGeometry.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
          this.leafMaterial.color.set(params.leafColor);
        }
      }

      // --- Main Scene Setup ---
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050505);

      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 5000);
      camera.position.set(350, 250, 450);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      const treeGroup = new THREE.Group();
      scene.add(treeGroup);

      // Floor & Grid
      const floorGeo = new THREE.PlaneGeometry(1500, 1500);
      const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.15, metalness: 0.4 });
      const floorMesh = new THREE.Mesh(floorGeo, floorMat);
      floorMesh.rotation.x = -Math.PI / 2;
      floorMesh.receiveShadow = true;
      scene.add(floorMesh);

      const gridHelper = new THREE.GridHelper(1500, 50, 0x333333, 0x111111);
      gridHelper.position.y = 0.1;
      scene.add(gridHelper);

      // Lights
      const ambientLight = new THREE.AmbientLight(0xffffff, params.ambientIntensity);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, params.dirIntensity);
      dirLight.position.set(200, 600, 200);
      dirLight.castShadow = true;
      dirLight.shadow.camera.left = -500; dirLight.shadow.camera.right = 500;
      dirLight.shadow.camera.top = 500; dirLight.shadow.camera.bottom = -500;
      dirLight.shadow.mapSize.set(2048, 2048);
      scene.add(dirLight);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 150, 0);
      controls.enableDamping = true;

      let tree = new Tree(treeGroup);

      // --- GUI ---
      const gui = new GUI({ title: 'Tree Simulation' });
      
      const growthFolder = gui.addFolder('Growth Controls');
      growthFolder.add(params, 'maxBranches', 100, 10000, 100).name('Max Branches');
      growthFolder.add(params, 'minDist', 1, 30).name('Min Dist (Reach)');
      growthFolder.add(params, 'maxDist', 50, 400).name('Max Dist (View)');
      growthFolder.add(params, 'leafCount', 100, 10000, 100).name('Leaf Quantity');
      growthFolder.add(params, 'branchCount').name('Current Branches').listen().disable();

      const styleFolder = gui.addFolder('Visual Style');
      styleFolder.add(params, 'initialRadius', 0.5, 15).name('Trunk Width');
      styleFolder.add(params, 'radiusDecay', 0.8, 0.99).name('Taper Rate');
      styleFolder.addColor(params, 'trunkColor').name('Trunk Color');
      styleFolder.addColor(params, 'leafColor').name('Leaf Color');

      const lightFolder = gui.addFolder('Environment');
      lightFolder.add(params, 'ambientIntensity', 0, 2).name('Ambient').onChange(v => ambientLight.intensity = v);
      lightFolder.add(params, 'dirIntensity', 0, 10).name('Sun Intensity').onChange(v => dirLight.intensity = v);

      gui.add(params, 'resetTree').name('REGENERATE TREE');

      function resetTree() {
        treeGroup.clear();
        tree = new Tree(treeGroup);
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      function animate() {
        requestAnimationFrame(animate);
        
        // Grow if leaves exist AND we are under the branch limit
        if (tree.leaves.length > 0 && tree.branches.length < params.maxBranches) {
          tree.grow();
        }

        treeGroup.rotation.y += 0.003;
        controls.update();
        renderer.render(scene, camera);
      }
      animate();
    </script>
  </body>
</html>
